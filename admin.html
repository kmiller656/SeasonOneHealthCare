<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin | Season One Healthcare</title>
<link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/site.css">
<style>
  .admin-wrap{max-width:900px;margin:0 auto;padding:40px 26px 80px}
  .admin-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:30px}
  .admin-head h1{font-size:1.5rem}
  .login-card{max-width:400px;margin:80px auto;background:var(--white);border:1px solid var(--line-2);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);padding:36px}
  .login-card h1{font-size:1.3rem;margin-bottom:6px}
  .login-card p{color:var(--ink-soft);font-weight:500;font-size:0.92rem;margin-bottom:20px}
  .tabs{display:flex;gap:8px;margin-bottom:26px;flex-wrap:wrap}
  .tab-btn{background:var(--white);border:1.5px solid var(--line-2);color:var(--ink-2);font-weight:700;font-size:0.92rem;padding:10px 18px;border-radius:20px;cursor:pointer}
  .tab-btn.active{background:var(--ink);color:var(--white);border-color:var(--ink)}
  .admin-panel{display:none}
  .admin-panel.active{display:block}
  .admin-row{background:var(--white);border:1px solid var(--line-2);border-radius:var(--r-md);padding:18px 20px;margin-bottom:12px;display:flex;gap:16px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap}
  .admin-row .info{flex:1;min-width:220px}
  .admin-row .info h3{font-size:1.02rem;margin-bottom:4px}
  .admin-row .info .meta{font-size:0.84rem;color:var(--ink-soft);font-weight:600;margin-bottom:6px}
  .admin-row .info p{font-size:0.9rem;color:var(--ink-2);font-weight:500;max-width:60ch}
  .admin-row .actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .status-badge{font-size:0.72rem;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:0.02em}
  .status-badge.pending{background:var(--sun);color:var(--sun-ink)}
  .status-badge.approved{background:var(--sage);color:var(--sage-ink)}
  .btn-sm{padding:8px 14px;font-size:0.84rem;border-radius:8px}
  .btn-danger{background:var(--peach);color:var(--peach-ink)}
  .btn-danger:hover{background:#f0c9b3}
  .empty-note{color:var(--ink-soft);font-weight:600;padding:30px 0;text-align:center}
  .story-form{background:var(--white);border:1px solid var(--line-2);border-radius:var(--r-md);padding:24px;margin-bottom:26px;display:none}
  .story-form.open{display:block}
</style>
</head>
<body class="so-page">

<div class="admin-wrap">
  <div class="admin-head">
    <a class="brand" href="/index.html" style="text-decoration:none">
      <span class="name" style="font-weight:800">Season One <span style="color:var(--ink-soft);font-weight:600">Admin</span></span>
    </a>
    <button class="btn btn-ghost btn-sm" id="signout-btn" style="display:none">Sign out</button>
  </div>

  <div class="login-card" id="login-card">
    <h1>Admin login</h1>
    <p>Sign in to manage providers, jobs, and Good News stories.</p>
    <div class="form-error" id="login-error">Incorrect email or password.</div>
    <form id="login-form">
      <div class="form-group"><label>Email</label><input type="email" id="login-email" required></div>
      <div class="form-group"><label>Password</label><input type="password" id="login-password" required></div>
      <button type="submit" class="btn btn-primary btn-block">Log in</button>
    </form>
  </div>

  <div id="dashboard" style="display:none">
    <div class="tabs">
      <button class="tab-btn active" data-panel="providers-panel">Providers</button>
      <button class="tab-btn" data-panel="jobs-panel">Jobs</button>
      <button class="tab-btn" data-panel="stories-panel">Good News</button>
    </div>

    <div class="admin-panel active" id="providers-panel">
      <div id="providers-list"><p class="empty-note">Loading…</p></div>
    </div>

    <div class="admin-panel" id="jobs-panel">
      <div id="jobs-list"><p class="empty-note">Loading…</p></div>
    </div>

    <div class="admin-panel" id="stories-panel">
      <button class="btn btn-navy btn-sm" id="new-story-btn" style="margin-bottom:16px">+ New story</button>
      <form class="story-form" id="story-form">
        <input type="hidden" id="story-id">
        <div class="form-group"><label>Title *</label><input type="text" id="story-title" required></div>
        <div class="form-row">
          <div class="form-group"><label>Slug *</label><input type="text" id="story-slug" required></div>
          <div class="form-group"><label>Tag</label><input type="text" id="story-tag" placeholder="e.g. Recovery, Access, Peer Support"></div>
        </div>
        <div class="form-group"><label>Excerpt</label><textarea id="story-excerpt" rows="2"></textarea></div>
        <div class="form-group"><label>Body (paragraphs separated by a blank line)</label><textarea id="story-body" rows="8"></textarea></div>
        <div class="form-row">
          <div class="form-group"><label>Byline</label><input type="text" id="story-byline" value="A Season One story"></div>
          <div class="form-group"><label>Status</label>
            <select id="story-status">
              <option value="approved">Approved (live now)</option>
              <option value="pending">Pending (not visible yet)</option>
            </select>
          </div>
        </div>
        <div style="display:flex;gap:10px">
          <button type="submit" class="btn btn-primary">Save story</button>
          <button type="button" class="btn btn-ghost" id="cancel-story-btn">Cancel</button>
        </div>
      </form>
      <div id="stories-list"><p class="empty-note">Loading…</p></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/site.js"></script>
<script>
(function () {
  var client = getSupabaseClient();
  var loginCard = document.getElementById('login-card');
  var dashboard = document.getElementById('dashboard');
  var signoutBtn = document.getElementById('signout-btn');
  var loginError = document.getElementById('login-error');

  function showDashboard() {
    loginCard.style.display = 'none';
    dashboard.style.display = 'block';
    signoutBtn.style.display = 'inline-flex';
    loadProviders();
    loadJobs();
    loadStories();
  }
  function showLogin() {
    loginCard.style.display = 'block';
    dashboard.style.display = 'none';
    signoutBtn.style.display = 'none';
  }

  client.auth.getSession().then(function (res) {
    if (res.data.session) showDashboard(); else showLogin();
  });

  document.getElementById('login-form').addEventListener('submit', function (e) {
    e.preventDefault();
    loginError.style.display = 'none';
    var email = document.getElementById('login-email').value.trim();
    var password = document.getElementById('login-password').value;
    client.auth.signInWithPassword({ email: email, password: password }).then(function (res) {
      if (res.error) { loginError.style.display = 'block'; return; }
      showDashboard();
    });
  });

  signoutBtn.addEventListener('click', function () {
    client.auth.signOut().then(showLogin);
  });

  // ─── Tabs ───────────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
      document.querySelectorAll('.admin-panel').forEach(function (p) { p.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById(btn.getAttribute('data-panel')).classList.add('active');
    });
  });

  // ─── Providers ──────────────────────────────────────────
  function loadProviders() {
    var el = document.getElementById('providers-list');
    client.from('providers').select('*').order('created_at', { ascending: false }).then(function (res) {
      var rows = res.data || [];
      if (!rows.length) { el.innerHTML = '<p class="empty-note">No providers yet.</p>'; return; }
      el.innerHTML = rows.map(function (p) {
        var meta = [p.provider_type, p.location, p.email].filter(Boolean).join(' · ');
        return '<div class="admin-row" data-id="' + p.id + '">' +
          '<div class="info"><h3>' + escapeHtml(p.practice_name) + '</h3><div class="meta">' + escapeHtml(meta) + '</div><p>' + escapeHtml(p.specialty || '') + '</p></div>' +
          '<div class="actions"><span class="status-badge ' + p.status + '">' + p.status + '</span>' +
          (p.status === 'pending' ? '<button class="btn btn-primary btn-sm approve-btn" data-table="providers" data-id="' + p.id + '">Approve</button>' : '') +
          '<button class="btn btn-danger btn-sm delete-btn" data-table="providers" data-id="' + p.id + '">Delete</button></div>' +
          '</div>';
      }).join('');
    });
  }

  // ─── Jobs ───────────────────────────────────────────────
  function loadJobs() {
    var el = document.getElementById('jobs-list');
    client.from('jobs').select('*').order('created_at', { ascending: false }).then(function (res) {
      var rows = res.data || [];
      if (!rows.length) { el.innerHTML = '<p class="empty-note">No job postings yet.</p>'; return; }
      el.innerHTML = rows.map(function (j) {
        var meta = [j.organization, j.location, j.email].filter(Boolean).join(' · ');
        return '<div class="admin-row" data-id="' + j.id + '">' +
          '<div class="info"><h3>' + escapeHtml(j.role_title) + '</h3><div class="meta">' + escapeHtml(meta) + '</div><p>' + escapeHtml(j.role_details || '') + '</p></div>' +
          '<div class="actions"><span class="status-badge ' + j.status + '">' + j.status + '</span>' +
          (j.status === 'pending' ? '<button class="btn btn-primary btn-sm approve-btn" data-table="jobs" data-id="' + j.id + '">Approve</button>' : '') +
          '<button class="btn btn-danger btn-sm delete-btn" data-table="jobs" data-id="' + j.id + '">Delete</button></div>' +
          '</div>';
      }).join('');
    });
  }

  // ─── Good News stories ──────────────────────────────────
  function loadStories() {
    var el = document.getElementById('stories-list');
    client.from('good_news_posts').select('*').order('created_at', { ascending: false }).then(function (res) {
      var rows = res.data || [];
      if (!rows.length) { el.innerHTML = '<p class="empty-note">No stories yet.</p>'; return; }
      el.innerHTML = rows.map(function (s) {
        return '<div class="admin-row" data-id="' + s.id + '">' +
          '<div class="info"><h3>' + escapeHtml(s.title) + '</h3><div class="meta">' + escapeHtml(s.tag || '') + ' · /' + escapeHtml(s.slug) + '</div><p>' + escapeHtml(s.excerpt || '') + '</p></div>' +
          '<div class="actions"><span class="status-badge ' + s.status + '">' + s.status + '</span>' +
          '<button class="btn btn-ghost btn-sm edit-story-btn" data-id="' + s.id + '">Edit</button>' +
          '<button class="btn btn-danger btn-sm delete-btn" data-table="good_news_posts" data-id="' + s.id + '">Delete</button></div>' +
          '</div>';
      }).join('');
      el.querySelectorAll('.edit-story-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var row = rows.filter(function (r) { return r.id === btn.getAttribute('data-id'); })[0];
          if (row) openStoryForm(row);
        });
      });
    });
  }

  var storyForm = document.getElementById('story-form');
  var storyTitle = document.getElementById('story-title');
  var storySlug = document.getElementById('story-slug');
  var slugManuallyEdited = false;
  storySlug.addEventListener('input', function () { slugManuallyEdited = true; });
  storyTitle.addEventListener('input', function () {
    if (slugManuallyEdited) return;
    storySlug.value = storyTitle.value.toLowerCase().trim()
      .replace(/['"]/g, '').replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
  });

  function openStoryForm(row) {
    slugManuallyEdited = true;
    document.getElementById('story-id').value = row ? row.id : '';
    storyTitle.value = row ? row.title : '';
    storySlug.value = row ? row.slug : '';
    document.getElementById('story-tag').value = row ? (row.tag || '') : '';
    document.getElementById('story-excerpt').value = row ? (row.excerpt || '') : '';
    document.getElementById('story-body').value = row ? (row.body || '') : '';
    document.getElementById('story-byline').value = row ? (row.byline || 'A Season One story') : 'A Season One story';
    document.getElementById('story-status').value = row ? row.status : 'approved';
    slugManuallyEdited = !!row;
    storyForm.classList.add('open');
  }
  document.getElementById('new-story-btn').addEventListener('click', function () { openStoryForm(null); });
  document.getElementById('cancel-story-btn').addEventListener('click', function () {
    storyForm.classList.remove('open');
    storyForm.reset();
  });

  storyForm.addEventListener('submit', function (e) {
    e.preventDefault();
    var id = document.getElementById('story-id').value;
    var payload = {
      title: storyTitle.value.trim(),
      slug: storySlug.value.trim(),
      tag: document.getElementById('story-tag').value.trim() || null,
      excerpt: document.getElementById('story-excerpt').value.trim() || null,
      body: document.getElementById('story-body').value.trim() || null,
      byline: document.getElementById('story-byline').value.trim() || null,
      status: document.getElementById('story-status').value
    };
    var query = id
      ? client.from('good_news_posts').update(payload).eq('id', id)
      : client.from('good_news_posts').insert(payload);
    query.then(function (res) {
      if (res.error) { alert('Could not save story: ' + res.error.message); return; }
      storyForm.classList.remove('open');
      storyForm.reset();
      loadStories();
    });
  });

  // ─── Delegated approve/delete handlers ──────────────────
  document.getElementById('dashboard').addEventListener('click', function (e) {
    var approveBtn = e.target.closest('.approve-btn');
    if (approveBtn) {
      var table = approveBtn.getAttribute('data-table');
      client.from(table).update({ status: 'approved' }).eq('id', approveBtn.getAttribute('data-id')).then(function () {
        if (table === 'providers') loadProviders(); else loadJobs();
      });
      return;
    }
    var deleteBtn = e.target.closest('.delete-btn');
    if (deleteBtn) {
      if (!confirm('Delete this permanently? This cannot be undone.')) return;
      var t = deleteBtn.getAttribute('data-table');
      client.from(t).delete().eq('id', deleteBtn.getAttribute('data-id')).then(function () {
        if (t === 'providers') loadProviders();
        else if (t === 'jobs') loadJobs();
        else loadStories();
      });
    }
  });
})();
</script>
</body>
</html>
